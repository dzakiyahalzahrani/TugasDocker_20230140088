<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Form Input Mahasiswa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
    <h4 class="fw-bold mb-4">Form Input Mahasiswa</h4>
    <form th:action="@{/form}" method="post">
        <div class="mb-3">
            <label for="nama" class="form-label">Nama:</label>
            <input type="text" id="nama" name="nama" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="nim" class="form-label">NIM:</label>
            <input type="text" id="nim" name="nim" class="form-control" required>
        </div>
        <div class="mb-4">
            <label class="form-label">Jenis Kelamin:</label>
            <div class="form-check mb-2">
                <input class="form-check-input" type="radio" name="jenisKelamin" id="laki" value="Laki-laki" required>
                <label class="form-check-label" for="laki">Laki-laki</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="jenisKelamin" id="perempuan" value="Perempuan">
                <label class="form-check-label" for="perempuan">Perempuan</label>
            </div>
        </div>
        <button type="submit" class="btn btn-primary mb-3">Submit</button>
    </form>
    <div>
        <a th:href="@{/home}" class="text-decoration-none">Kembali ke Home</a>
    </div>
</div>
</body>
</html>
