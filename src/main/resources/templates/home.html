<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .table thead th { background-color: #007bff; color: white; border: none; }
        .table tbody td { border-color: #dee2e6; }
    </style>
</head>
<body class="bg-light">
<div class="container mt-4">
    <h4 class="fw-bold">MY Website 20230140088</h4>
    <p class="mb-2">Selamat datang di aplikasi!</p>
    <div class="text-center my-4">
        <img th:src="@{/images/fotoku.jpeg}" alt="Foto Profil" width="150" height="150" class="rounded-circle object-fit-cover shadow-sm border border-2 border-white">

        <h5 class="mt-3 fw-bold">Dzakiyah Al Zahrani</h5>
        <p class="text-muted">Mahasiswa Teknologi Informasi</p>
    </div>
    <a th:href="@{/form}" class="text-decoration-none d-block mb-4">+ Input Data Mahasiswa</a>



    <h6 class="fw-bold mb-2">Data Mahasiswa</h6>
    <table class="table text-center bg-white border">
        <thead>
        <tr>
            <th>No</th>
            <th>Nama</th>
            <th>NIM</th>
            <th>Jenis Kelamin</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${users.empty}">
            <td colspan="4" class="text-muted">Belum ada data</td>
        </tr>
        <tr th:each="user, stat : ${users}">
            <td th:text="${stat.count}"></td>
            <td th:text="${user.nama}"></td>
            <td th:text="${user.nim}"></td>
            <td th:text="${user.jenisKelamin}"></td>
        </tr>
        </tbody>
    </table>

    <a th:href="@{/login}" class="text-decoration-none mt-2 d-inline-block">Logout</a>
</div>
</body>
</html>
